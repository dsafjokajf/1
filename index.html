<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f6fbfa">
  <title>Mianer 恋人小手机</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23ff7f8d'/%3E%3Cpath d='M20 23c0-5 4-9 9-9 3 0 5 1 7 4 2-3 4-4 7-4 5 0 9 4 9 9 0 11-16 21-16 21S20 34 20 23Z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="session-upgrade.css">
</head>
<body>
  <main class="page" aria-label="Mianer 恋人小手机">
    <section class="device" aria-label="手机聊天应用">
      <div class="device-key key-left" aria-hidden="true"></div>
      <div class="device-key key-right" aria-hidden="true"></div>
      <div class="screen" id="screen">
        <header class="status-bar" aria-label="手机状态">
          <span id="clock">09:18</span>
          <span class="status-icons" aria-hidden="true">
            <span class="signal"><i></i><i></i><i></i></span>
            <span class="battery"><i></i></span>
          </span>
        </header>

        <header class="topbar">
          <button class="icon-button dark" id="globalArchiveButton" type="button" title="聊天记录管理" aria-label="聊天记录管理">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-9Z"/><path d="M3 10h18"/></svg>
          </button>
          <div class="brand">
            <strong>Mianer Phone</strong>
            <span id="connectionState">本地陪伴</span>
          </div>
          <button class="icon-button dark" id="userPersonaButton" type="button" title="User 人设" aria-label="User 人设">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/><path d="M4 20c1.5-4 14.5-4 16 0"/></svg>
          </button>
        </header>

        <section class="viewport" aria-live="polite">
          <section class="view chat-view is-active" id="view-chat" data-view="chat" aria-label="聊天">
            <div class="chat-list-screen" id="chatListScreen">
              <div class="section-head chat-list-head">
                <div>
                  <h1>聊天</h1>
                  <p id="chatOverview">0 位联系人</p>
                </div>
              </div>
              <div class="search-row compact-search">
                <label class="sr-only" for="chatSearch">搜索聊天</label>
                <input id="chatSearch" type="search" placeholder="搜索聊天">
              </div>
              <div class="chat-list" id="chatList"></div>
            </div>

            <div class="conversation-screen" id="conversationScreen" hidden>
              <header class="conversation-head" id="conversationHead">
                <div class="conversation-left-tools">
                  <button class="icon-button light" id="backToChatsButton" type="button" title="返回聊天列表" aria-label="返回聊天列表">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                  </button>
                </div>
                <div class="conversation-title" id="conversationTitle"></div>
              </header>

              <section class="active-persona" id="activePersona" aria-label="当前联系人" hidden></section>
              <section class="world-hints" id="worldHints" aria-label="已命中的世界书"></section>
              <section class="messages" id="messages" aria-label="聊天记录"></section>

              <form class="composer" id="chatForm">
                <label class="sr-only" for="chatInput">输入消息</label>
                <button class="plus-button" id="plusButton" type="button" title="更多" aria-label="更多功能">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                </button>
                <div class="quote-preview" id="quotePreview" hidden>
                  <span id="quotePreviewText"></span>
                  <button class="quote-clear" id="clearQuoteButton" type="button" title="取消引用" aria-label="取消引用">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
                  </button>
                </div>
                <textarea id="chatInput" rows="1" maxlength="1600" placeholder="对他说点什么..." autocomplete="off"></textarea>
                <button class="reply-button" id="replyButton" type="button" title="点击AI回复" aria-label="点击AI回复"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/><path d="M12 8v5"/><path d="M12 16h.01"/></svg></button>
                <button class="send-button" id="sendButton" type="submit" title="发送" aria-label="发送消息">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12 20 4l-5 16-3-7-8-1Z"/><path d="m12 13 8-9"/></svg>
                </button>
              </form>
            </div>
          </section>

          <section class="view library-view" id="view-characters" data-view="characters" aria-label="通讯录">
            <div class="section-head">
              <div>
                <h1>通讯录</h1>
                <p id="characterCount">0 个联系人</p>
              </div>
              <button class="solid-button" id="addCharacterButton" type="button">添加联系人</button>
            </div>
            <div class="search-row compact-search">
              <label class="sr-only" for="characterSearch">搜索通讯录</label>
              <input id="characterSearch" type="search" placeholder="搜索姓名、标签或简介">
            </div>
            <div class="contact-stats" id="contactStats"></div>
            <div class="list" id="characterList"></div>
          </section>

          <section class="view library-view" id="view-world" data-view="world" aria-label="世界书">
            <div class="section-head">
              <div>
                <h1>世界书</h1>
                <p id="worldCount">0 条设定</p>
              </div>
              <button class="solid-button" id="addWorldButton" type="button">添加条目</button>
            </div>
            <div class="search-row">
              <label class="sr-only" for="worldSearch">搜索世界书</label>
              <input id="worldSearch" type="search" placeholder="搜索标题、关键词或内容">
            </div>
            <div class="list" id="worldList"></div>
          </section>

          <section class="view moments-view" id="view-moments" data-view="moments" aria-label="朋友圈">
            <div class="section-head compact">
              <div>
                <h1>朋友圈</h1>
                <p id="momentsCount">0 条动态</p>
              </div>
              <button class="solid-button" id="addMomentButton" type="button">发动态</button>
            </div>
            <div class="moments-feed" id="momentsFeed"></div>
          </section>

          <section class="view settings-view" id="view-settings" data-view="settings" aria-label="设置">
            <div class="section-head compact">
              <div>
                <h1>设置</h1>
                <p>接口和会话</p>
              </div>
            </div>

            <form class="settings-form" id="settingsForm">
              <label>
                <span>模型平台</span>
                <select id="apiPlatform" name="platform">
                  <option value="openai">OpenAI</option>
                  <option value="gemini">Gemini</option>
                  <option value="deepseek">DeepSeek</option>
                  <option value="glm">GLM / 智谱</option>
                  <option value="MyAPI">MyAPI</option>
                </select>
              </label>
              <label>
                <span>API 地址</span>
                <input id="apiEndpoint" name="endpoint" type="url" placeholder="https://api.openai.com/v1/chat/completions" autocomplete="off">
              </label>
              <label>
                <span>API Key</span>
                <input id="apiKey" name="apiKey" type="password" placeholder="sk-... 或代理密钥" autocomplete="off">
              </label>
              <div class="two-fields">
                <label>
                  <span>模型</span>
                  <div class="select-wrapper"><select id="apiModel" name="model" style="width:100%"></select><input id="apiModelCustom" type="text" placeholder="或手动输入模型名" style="margin-top: 5px; display: none;"></div>
                </label>
                <label>
                  <span>温度</span>
                  <input id="temperature" name="temperature" type="number" min="0" max="2" step="0.01" placeholder="0.85" inputmode="decimal">
                </label>
              </div>
              <label class="checkline">
                <input id="rememberKey" name="rememberKey" type="checkbox">
                <span>在本机记住 Key</span>
              </label>
              <label class="checkline">
                <input id="manualReplyMode" name="manualReplyMode" type="checkbox"><span>手动点击按钮才会回复</span>
              </label>
              <input id="proxyMode" name="proxyMode" type="hidden" value="false">
              <input id="corsProxyMode" name="corsProxyMode" type="hidden" value="false">
              <div class="button-row">
                <button class="ghost-button" id="testButton" type="button">测试</button>
                <button class="solid-button" type="submit">保存</button>
              </div>
            </form>

            <div class="settings-actions">
              <button class="ghost-button" id="exportButton" type="button">导出设定</button>
              <button class="ghost-button" id="importButton" type="button">导入设定</button>
              <button class="danger-button" id="resetButton" type="button">恢复默认</button>
              <input class="sr-only" id="importFile" type="file" accept="application/json">
            </div>

            <p class="note" id="settingsNote">公开网页建议使用自己的服务端代理，再把代理地址填入这里。</p>
          </section>
        </section>

        <nav class="tabbar" aria-label="主导航">
          <button class="tab is-active" type="button" data-tab="chat" aria-label="聊天">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6h14v9H9l-4 4V6Z"/></svg><span>聊天</span>
          </button>
          <button class="tab" type="button" data-tab="characters" aria-label="通讯录">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM4 20c1.5-4 14.5-4 16 0"/></svg><span>通讯录</span>
          </button>
          <button class="tab" type="button" data-tab="world" aria-label="世界书">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H19v16H7.5A2.5 2.5 0 0 0 5 21V5.5Z"/><path d="M5 5.5V21"/></svg><span>世界书</span>
          </button>
          <button class="tab" type="button" data-tab="moments" aria-label="朋友圈">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z"/><path d="M7.5 12h9M12 7.5v9"/></svg><span>朋友圈</span>
          </button>
          <button class="tab" type="button" data-tab="settings" aria-label="设置">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7Z"/><path d="m19 12 2-1.5-2-3.5-2.4 1a7.5 7.5 0 0 0-1.6-.9L14.7 4H9.3L9 7.1a7.5 7.5 0 0 0-1.6.9L5 7l-2 3.5L5 12l-2 1.5L5 17l2.4-1a7.5 7.5 0 0 0 1.6.9l.3 3.1h5.4l.3-3.1a7.5 7.5 0 0 0 1.6-.9L19 17l2-3.5L19 12Z"/></svg><span>设置</span>
          </button>
        </nav>

        <aside class="drawer" id="archiveDrawer" aria-hidden="true" aria-label="聊天记录管理">
          <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="archiveDrawerTitle">
            <div class="drawer-head">
              <div>
                <h2 id="archiveDrawerTitle">聊天记录管理</h2>
                <p id="archiveDrawerSubtitle">保存、载入和删除聊天存档。</p>
              </div>
              <button class="icon-button" id="closeArchiveDrawer" type="button" title="关闭" aria-label="关闭聊天记录管理">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </div>
            <div class="archive-actions-main">
              <label class="archive-name-field">
                <span>存档名</span>
                <input id="archiveNameInput" type="text" maxlength="40" placeholder="给当前聊天命名">
              </label>
              <button class="solid-button" id="saveArchiveButton" type="button">保存当前聊天</button>
              <button class="ghost-button" id="startFreshArchiveButton" type="button">新聊天</button>
            </div>
            <div class="archive-toolbar">
              <div class="segmented" role="group" aria-label="存档筛选">
                <button class="is-active" type="button" data-archive-filter="current">当前联系人</button>
                <button type="button" data-archive-filter="all">全部</button>
              </div>
              <label class="sr-only" for="archiveSearch">搜索存档</label>
              <input id="archiveSearch" type="search" placeholder="搜索存档名">
            </div>
            <div class="archive-list" id="archiveList"></div>
          </div>
        </aside>

        <aside class="drawer" id="userPersonaDrawer" aria-hidden="true" aria-label="User 人设">
          <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="userPersonaDrawerTitle">
            <div class="drawer-head">
              <div>
                <h2 id="userPersonaDrawerTitle">User 人设</h2>
                <p>你的名字、头像字和人设会参与聊天提示词。</p>
              </div>
              <button class="icon-button" id="closeUserPersonaDrawer" type="button" title="关闭" aria-label="关闭 User 人设">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </div>
            <form class="editor-form" id="userPersonaForm">
              <div class="two-fields user-profile-fields">
                <label>
                  <span>我的名字</span>
                  <input id="userNick" type="text" maxlength="28" placeholder="我的名字" autocomplete="off">
                </label>
                <label>
                  <span>头像字</span>
                  <input id="userAvatarText" type="text" maxlength="2" placeholder="我" autocomplete="off">
                </label>
              </div>
              <label>
                <span>我的人设</span>
                <textarea id="userPersona" rows="6" maxlength="1600" placeholder="写你的称呼、身份、关系、说话习惯和偏好"></textarea>
              </label>
              <label>
                <span>指令</span>
                <textarea id="userInstruction" rows="4" maxlength="1200" placeholder="你希望角色长期遵守的说话方式、边界或互动规则"></textarea>
              </label>
              <label>
                <span>拍一拍</span>
                <input id="userNudge" type="text" maxlength="40" placeholder="的脑袋" autocomplete="off">
              </label>
              <div class="button-row sticky-actions">
                <button class="ghost-button" id="resetUserPersonaButton" type="button">清空</button>
                <button class="solid-button" type="submit">保存</button>
              </div>
            </form>
          </div>
        </aside>

        <aside class="drawer" id="characterDrawer" aria-hidden="true" aria-label="编辑联系人">
          <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="characterDrawerTitle">
            <div class="drawer-head">
              <div>
                <h2 id="characterDrawerTitle">编辑联系人</h2>
                <p>TA 的性格、开场白和提示词都会保存到本机。</p>
              </div>
              <button class="icon-button" id="closeCharacterDrawer" type="button" title="关闭" aria-label="关闭联系人编辑">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </div>
            <form class="editor-form" id="characterForm">
              <input id="characterId" type="hidden">
              <div class="three-fields">
                <label>
                  <span>名字</span>
                  <input id="characterName" type="text" maxlength="24" placeholder="未命名联系人">
                </label>
                <label>
                  <span>头像字</span>
                  <input id="characterAvatar" type="text" maxlength="2" placeholder="TA">
                </label>
                <label>
                  <span>主色</span>
                  <input id="characterColor" type="color">
                </label>
              </div>
              <input id="characterTitle" type="hidden">
              <div class="mode-switches" aria-label="模式切换">
                <label class="mode-chip"><input id="modeOnline" name="characterMode" value="online" type="checkbox" checked><span>线上模式</span></label>
                <label class="mode-chip"><input id="modeOffline" name="characterMode" value="offline" type="checkbox"><span>线下模式</span></label>
                <label class="mode-chip"><input id="modeInnerVoice" name="characterMode" value="innerVoice" type="checkbox"><span>心声模式</span></label>
                <label class="mode-chip"><input id="modeDistance" name="characterMode" value="distance" type="checkbox"><span>异地模式</span></label>
              </div>
              <label>
                <span>标签</span>
                <input id="characterTags" type="text" placeholder="温柔, 克制, 会哄人">
              </label>
              <label>
                <span>简介</span>
                <textarea id="characterIntro" rows="2" maxlength="180" placeholder="可留空"></textarea>
              </label>
              <label>
                <span>开场白</span>
                <textarea id="characterGreeting" rows="3" maxlength="420" placeholder="可留空，不填就不会自动生成开场消息"></textarea>
              </label>
              <textarea id="characterSystem" hidden></textarea>
              <label><span>绑定/关联世界书设定项目</span><div id="characterWorldBooks" style="display: flex; flex-direction: column; gap: 8px; max-height: 150px; overflow-y: auto; background: rgba(24,32,42,0.03); border: 1px solid rgba(24,32,42,0.08); padding: 10px; border-radius: 14px; margin-top: 5px;"></div>
              </label>
              <div class="button-row sticky-actions">
                <button class="ghost-button" id="duplicateCharacterButton" type="button">复制</button>
                <button class="solid-button" type="submit">保存联系人</button>
              </div>
            </form>
          </div>
        </aside>

        <aside class="drawer" id="worldDrawer" aria-hidden="true" aria-label="编辑世界书">
          <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="worldDrawerTitle">
            <div class="drawer-head">
              <div>
                <h2 id="worldDrawerTitle">编辑世界书</h2>
                <p>命中关键词后会注入到当前联系人的提示词里。</p>
              </div>
              <button class="icon-button" id="closeWorldDrawer" type="button" title="关闭" aria-label="关闭世界书编辑">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </div>
            <form class="editor-form" id="worldForm">
              <input id="worldId" type="hidden">
              <label>
                <span>标题</span>
                <input id="worldTitle" type="text" maxlength="50" placeholder="未命名设定">
              </label>
              <div class="two-fields">
                <label>
                  <span>范围</span>
                  <select id="worldScope"></select>
                </label>
                <label>
                  <span>优先级</span>
                  <input id="worldPriority" type="number" min="0" max="100" step="1" placeholder="10">
                </label>
              </div>
              <label>
                <span>触发关键词</span>
                <input id="worldKeywords" type="text" placeholder="睡前, 回家, 牵手">
              </label>
              <label class="checkline">
                <input id="worldAlways" type="checkbox">
                <span>始终注入</span>
              </label>
              <label class="checkline">
                <input id="worldEnabled" type="checkbox">
                <span>启用条目</span>
              </label>
              <label>
                <span>设定内容</span>
                <textarea id="worldContent" rows="8" maxlength="2600" placeholder="可留空"></textarea>
              </label>
              <div class="button-row sticky-actions">
                <button class="ghost-button" id="duplicateWorldButton" type="button">复制</button>
                <button class="solid-button" type="submit">保存条目</button>
              </div>
            </form>
          </div>
        </aside>

        <aside class="drawer" id="momentDrawer" aria-hidden="true" aria-label="发布朋友圈">
          <div class="drawer-panel" role="dialog" aria-modal="true" aria-labelledby="momentDrawerTitle">
            <div class="drawer-head">
              <div>
                <h2 id="momentDrawerTitle">发动态</h2>
                <p>这一条会保存在本机朋友圈里。</p>
              </div>
              <button class="icon-button" id="closeMomentDrawer" type="button" title="关闭" aria-label="关闭朋友圈编辑">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </div>
            <form class="editor-form" id="momentForm">
              <label>
                <span>内容</span>
                <textarea id="momentContent" rows="5" maxlength="600" placeholder="写一条朋友圈"></textarea>
              </label>
              <label>
                <span>可见角色</span>
                <select id="momentAudience"></select>
              </label>
              <div class="button-row sticky-actions">
                <button class="ghost-button" id="clearMomentButton" type="button">清空</button>
                <button class="solid-button" type="submit">发布</button>
              </div>
            </form>
          </div>
        </aside>

        <aside class="action-sheet" id="transferSheet" aria-hidden="true" aria-label="转账">
          <div class="sheet-card" role="dialog" aria-modal="true" aria-labelledby="transferSheetTitle">
            <div class="sheet-head">
              <h2 id="transferSheetTitle">转账</h2>
              <button class="icon-button" id="closeTransferSheet" type="button" title="关闭" aria-label="关闭转账">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>
              </button>
            </div>
            <form class="transfer-form" id="transferForm">
              <label class="amount-field">
                <span>￥</span>
                <input id="transferAmount" type="number" min="0.01" max="999999" step="0.01" inputmode="decimal" placeholder="0.00">
              </label>
              <label>
                <span>转账说明</span>
                <input id="transferNote" type="text" maxlength="40" placeholder="不用写也可以">
              </label>
              <button class="transfer-submit" type="submit">确认转账</button>
            </form>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="session-upgrade.js"></script>
  <script src="app.js"></script>
</body>
</html>
